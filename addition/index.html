<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home Addition Tool</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body>
  <main class="app">

    <header class="hero">
      <div class="hero-card">
        <div class="hero-left">
          <img class="logo" src="../logo.png" />
        </div>

        <div class="hero-mid">
          <h1>Home Addition Tool</h1>
          <div class="tagline">Full Build Estimator</div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:center;margin:12px 0;">
        <a href="/haroon-sons-quote/">Quote Tool</a>
        <a href="/haroon-sons-quote/deck/">Deck Tool</a>
        <a href="/haroon-sons-quote/addition/">Addition Tool</a>
      </div>
    </header>

    <section class="panel active">
      <div class="card">

        <h2>Project Setup</h2>

        <div class="grid">

          <label class="field">
            <span>Project Type</span>
            <select>
              <option>Attached</option>
              <option>Detached</option>
            </select>
          </label>

          <label class="field">
            <span>Foundation Type</span>
            <select>
              <option>Full Foundation</option>
              <option>Slab-on-Grade</option>
              <option>Pier / Footing</option>
            </select>
          </label>

        </div>

      </div>

      <div class="card">
        <h2>Scope (Coming Next)</h2>
        <p>We are building this step-by-step.</p>
      </div>

    </section>

  </main>
</body>
</html>
