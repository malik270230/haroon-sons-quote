<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Haroon & Sons Consulting Quote</title>
<link rel="stylesheet" href="styles.css?v=1" />
</head>

<body>
<main class="app">

<header class="hero">
<div class="hero-card">

<div class="hero-left">
<img id="companyLogo" class="logo" alt="Company logo" src="logo.png?v=1" />
</div>

<div class="hero-mid">
<h1 id="companyName">Haroon & Sons Consulting Quote</h1>
<div class="tagline">Fast estimate • Clear scope • Clean totals</div>
<div class="subline" id="markupBanner">Pricing tier: —</div>
</div>

<div class="hero-right">
<a id="companyPhone" class="contact" href="#"></a>
<a id="companyEmail" class="contact" href="#"></a>
</div>

</div>

<!-- 🔥 3 TOOL BUTTONS -->
<div style="display:flex;gap:10px;justify-content:center;margin:12px 0;flex-wrap:wrap;">

<a href="/haroon-sons-quote/"
style="padding:10px 14px;border-radius:12px;border:1px solid #4aa3ff;color:#e9eefc;text-decoration:none;">
Quote Tool
</a>

<a href="/haroon-sons-quote/deck/"
style="padding:10px 14px;border-radius:12px;border:1px solid #4aa3ff;color:#e9eefc;text-decoration:none;">
Deck Tool
</a>

<a href="/haroon-sons-quote/addition/"
style="padding:10px 14px;border-radius:12px;border:1px solid #4aa3ff;color:#e9eefc;text-decoration:none;">
Addition Tool
</a>

</div>

<nav class="tabs" role="tablist">
<button class="tab active" data-tab="input">INPUT</button>
<button class="tab" data-tab="quote">QUOTE</button>
<button class="tab" data-tab="rates">RATES</button>
</nav>

</header>

<section class="panel active" id="tab-input">

<div class="card">
<h2>Project Geometry</h2>

<div class="grid">
<label class="field">
<span>Project Area (SF)</span>
<input id="inFloorSF" type="number" placeholder="e.g., 1400" />
</label>

<label class="field">
<span>Ceiling Height (ft)</span>
<input id="inCeilFt" type="number" placeholder="e.g., 8" />
</label>

<label class="field">
<span>Project Length (ft)</span>
<input id="inLenFt" type="number" placeholder="optional" />
</label>

<label class="field">
<span>Project Width (ft)</span>
<input id="inWidFt" type="number" placeholder="optional" />
</label>

<label class="field">
<span>Perimeter Override (LF)</span>
<input id="inPerimLF" type="number" placeholder="optional" />
</label>
</div>

</div>

<div class="card">
<h2>Customer</h2>

<div class="grid">
<label class="field">
<span>Name</span>
<input id="inClientName" type="text" />
</label>

<label class="field">
<span>Address</span>
<input id="inClientAddress" type="text" />
</label>
</div>

</div>

<div class="card">
<h2>Scope</h2>
<div id="scopeList"></div>
</div>

<div class="card admin hidden" id="adminPanel">
<h2>Admin Controls</h2>

<div class="grid">

<label class="field">
<span>Pricing Markup %</span>
<input id="adminMarkupOverride" type="number" />
</label>

<label class="field">
<span>Tariff Enabled</span>
<select id="adminTariffEnabled">
<option value="0">OFF</option>
<option value="1">ON</option>
</select>
</label>

<label class="field">
<span>Tariff %</span>
<input id="adminTariffPct" type="number" />
</label>

<label class="field">
<span>Override Final Price</span>
<select id="adminOverrideEnabled">
<option value="0">OFF</option>
<option value="1">ON</option>
</select>
</label>

<label class="field">
<span>Manual Final Price ($)</span>
<input id="adminOverrideTotal" type="number" />
</label>

</div>

<button id="adminApplyBtn">Apply</button>
<button id="adminResetBtn">Reset</button>

</div>

</section>

<section class="panel" id="tab-quote">

<div class="card">

<h2>Quote</h2>

<table>
<thead>
<tr>
<th>Item</th>
<th>Total</th>
</tr>
</thead>

<tbody id="quoteBody"></tbody>

<tfoot>
<tr>
<td>Total</td>
<td id="grandTotal">$0</td>
</tr>
</tfoot>

</table>

</div>

</section>

<section class="panel" id="tab-rates">

<div class="card">
<h2>Rates</h2>
<table>
<tbody id="ratesBody"></tbody>
</table>
</div>

</section>

</main>

<script src="app.js?v=1"></script>

</body>
</html>
